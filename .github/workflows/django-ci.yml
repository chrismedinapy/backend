name: Django CI baseline

on:
  pull_request:
    branches:
      - main
      - release
  push:
    branches:
      - main
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: django-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: core.settings_ci
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  django-check:
    name: Django system, migration, test and coverage checks
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    services:
      postgis:
        image: postgis/postgis:14-3.2-alpine
        env:
          POSTGRES_DB: core_test
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U core -d core_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      mongodb:
        image: mongo:8.0
        env:
          MONGO_INITDB_DATABASE: core_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      rabbitmq:
        image: rabbitmq:4-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: core
          RABBITMQ_DEFAULT_PASS: core
          RABBITMQ_DEFAULT_VHOST: /
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install --yes --quiet --no-install-recommends \
            build-essential \
            gdal-bin \
            libgdal-dev \
            libpq-dev

      - name: Upgrade Python packaging tools
        run: |
          python -m pip install --quiet --upgrade "pip==24.3.1" "setuptools<76" "wheel<0.46"
          python -m pip --version

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet "coverage==7.6.1"

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Run Django system check
        run: python manage.py check

      - name: Validate Redis cache integration
        run: |
          python manage.py shell -c '
          from django.core.cache import cache
          key = "ci:redis:integration"
          value = "redis-is-ready"
          cache.set(key, value, timeout=60)
          assert cache.get(key) == value, "Redis cache value did not round-trip"
          cache.delete(key)
          assert cache.get(key) is None, "Redis cache key was not deleted"
          print("Redis cache integration validated")
          '

      - name: Validate MongoDB integration
        run: |
          python - <<'PY'
          import os
          from pymongo import MongoClient

          host = os.environ.get("MONGO_HOST", "localhost")
          port = int(os.environ.get("MONGO_PORT", "27017"))
          database_name = os.environ.get("MONGO_INITDB_DATABASE", "core_test")

          client = MongoClient(host=host, port=port, serverSelectionTimeoutMS=5000)
          client.admin.command("ping")

          collection = client[database_name]["ci_integration"]
          marker = {"name": "mongodb-ci", "status": "ready"}
          result = collection.insert_one(marker)
          stored = collection.find_one({"_id": result.inserted_id})
          assert stored is not None and stored["status"] == "ready", "MongoDB document did not round-trip"
          collection.delete_one({"_id": result.inserted_id})
          assert collection.find_one({"_id": result.inserted_id}) is None, "MongoDB document was not deleted"
          client.close()
          print("MongoDB integration validated")
          PY

      - name: Validate RabbitMQ connection through Celery configuration
        run: |
          python - <<'PY'
          from core.celery import app

          assert app.conf.broker_url, "Celery broker URL is not configured"

          with app.connection_for_write(connect_timeout=5) as connection:
              connection.ensure_connection(max_retries=3)
              assert connection.connected, "Celery did not establish a RabbitMQ connection"
              print(
                  "RabbitMQ connection validated through Celery configuration "
                  f"using transport={connection.transport.driver_name}"
              )
          PY

      - name: Check for missing migrations
        run: |
          python manage.py makemigrations --dry-run --verbosity 3 | tee /tmp/pending-migrations.log
          if grep -q '^Migrations for ' /tmp/pending-migrations.log; then
            echo 'Pending migrations detected.'
            exit 1
          fi

      - name: Apply database migrations
        run: python manage.py migrate --noinput --verbosity=1

      - name: Show migration plan
        run: python manage.py showmigrations --plan

      - name: Run Django test suite with coverage
        run: |
          set +e
          coverage erase
          coverage run --source=core,data,middleware manage.py test --verbosity=2 > /tmp/django-tests.log 2>&1
          test_status=$?
          set -e

          echo "===== Django test output ====="
          tail -n 250 /tmp/django-tests.log
          echo "===== Coverage report ====="
          coverage report --show-missing --fail-under=70
          coverage xml

          exit "$test_status"

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: django-coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14
