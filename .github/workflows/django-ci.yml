name: Django CI baseline

on:
  pull_request:
    branches:
      - release/django-5-ci
  push:
    branches:
      - release/django-5-ci
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: django-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: core.settings_ci
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  django-check:
    name: Django system, migration and test checks
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    services:
      postgis:
        image: postgis/postgis:13-3.2-alpine
        env:
          POSTGRES_DB: core_test
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U core -d core_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            gdal-bin \
            libgdal-dev \
            libpq-dev

      - name: Upgrade Python packaging tools
        run: |
          python -m pip install --upgrade "pip==24.3.1" "setuptools<76" "wheel<0.46"
          python -m pip --version

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Run Django system check
        run: python manage.py check

      - name: Check for missing migrations
        run: |
          python manage.py makemigrations --dry-run --verbosity 3 | tee /tmp/pending-migrations.log
          if grep -q '^Migrations for ' /tmp/pending-migrations.log; then
            echo 'Pending migrations detected.'
            exit 1
          fi

      - name: Apply database migrations
        run: python manage.py migrate --noinput

      - name: Show migration plan
        run: python manage.py showmigrations --plan

      - name: Run Django test suite
        run: |
          set +e
          python manage.py test --verbosity=2 > /tmp/django-tests.log 2>&1
          status=$?
          tail -n 200 /tmp/django-tests.log
          exit $status
