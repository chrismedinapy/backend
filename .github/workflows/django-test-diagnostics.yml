name: Django test diagnostics

on:
  pull_request:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: django-test-diagnostics-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: core.settings_ci
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  django-tests:
    name: Capture complete Django test output
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    services:
      postgis:
        image: postgis/postgis:14-3.2-alpine
        env:
          POSTGRES_DB: core_test
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U core -d core_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mongodb:
        image: mongo:8.0
        env:
          MONGO_INITDB_DATABASE: core_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:4-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: core
          RABBITMQ_DEFAULT_PASS: core
          RABBITMQ_DEFAULT_VHOST: /
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install --yes --quiet --no-install-recommends build-essential gdal-bin libgdal-dev libpq-dev
          python -m pip install --quiet --upgrade "pip==24.3.1" "setuptools<76" "wheel<0.46"
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet "coverage==7.6.1"
          python -m pip check
      - name: Apply database migrations
        run: python manage.py migrate --noinput --verbosity=1
      - name: Run Django tests
        shell: bash
        run: |
          set +e
          coverage erase
          coverage run --source=core,data,middleware manage.py test --verbosity=2 > /tmp/django-tests.log 2>&1
          test_status=$?
          coverage report --show-missing > /tmp/coverage-report.log 2>&1
          coverage_status=$?
          set -e
          printf 'test_status=%s\ncoverage_status=%s\n' "$test_status" "$coverage_status" > /tmp/django-test-status.txt
          cat /tmp/django-tests.log
          cat /tmp/coverage-report.log
          test "$test_status" -eq 0
          test "$coverage_status" -eq 0
      - name: Upload complete diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-diagnostics
          path: |
            /tmp/django-tests.log
            /tmp/coverage-report.log
            /tmp/django-test-status.txt
          if-no-files-found: warn
          retention-days: 3
