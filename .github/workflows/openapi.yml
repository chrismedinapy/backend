name: OpenAPI contract

on:
  pull_request:
    branches:
      - main
      - release
  push:
    branches:
      - main
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openapi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: core.settings_ci
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  validate-openapi:
    name: Generate and validate OpenAPI schema
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install native dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install --yes --quiet --no-install-recommends \
            gdal-bin \
            libgdal-dev \
            libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet --upgrade "pip==24.3.1" "setuptools<76" "wheel<0.46"
          python -m pip install --quiet -r requirements.txt
          python -m pip check

      - name: Generate and validate schema
        run: python manage.py spectacular --validate --file openapi.yaml

      - name: Verify versioned contract
        run: |
          python - <<'PY'
          import yaml

          with open("openapi.yaml", encoding="utf-8") as schema_file:
              schema = yaml.safe_load(schema_file)

          paths = schema.get("paths", {})
          assert paths, "OpenAPI schema contains no paths"
          assert all(path.startswith("/api/v1/") for path in paths), paths
          assert not any(path.startswith("/data/") for path in paths), paths

          bearer = schema["components"]["securitySchemes"]["bearerAuth"]
          assert bearer == {
              "type": "http",
              "scheme": "bearer",
              "bearerFormat": "JWT",
          }, bearer
          PY

      - name: Upload OpenAPI contract
        uses: actions/upload-artifact@v4
        with:
          name: openapi-contract
          path: openapi.yaml
          if-no-files-found: error
          retention-days: 14
